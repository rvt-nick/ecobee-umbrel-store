<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <radialGradient id="dial" cx="0.5" cy="0.45">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </radialGradient>
  </defs>

  <!-- Background tile -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg)"/>

  <!-- Outer thermostat ring -->
  <circle cx="512" cy="512" r="360" fill="#f8fafc" opacity="0.94"/>

  <!-- Tick marks -->
  <g stroke="#cbd5e1" stroke-width="6" stroke-linecap="round" transform="translate(512 512)">
    <line y1="-330" y2="-300"/>
    <line y1="-330" y2="-300" transform="rotate(30)"/>
    <line y1="-330" y2="-300" transform="rotate(60)"/>
    <line y1="-330" y2="-300" transform="rotate(90)"/>
    <line y1="-330" y2="-300" transform="rotate(120)"/>
    <line y1="-330" y2="-300" transform="rotate(150)"/>
    <line y1="-330" y2="-300" transform="rotate(180)"/>
    <line y1="-330" y2="-300" transform="rotate(210)"/>
    <line y1="-330" y2="-300" transform="rotate(240)"/>
    <line y1="-330" y2="-300" transform="rotate(270)"/>
    <line y1="-330" y2="-300" transform="rotate(300)"/>
    <line y1="-330" y2="-300" transform="rotate(330)"/>
  </g>

  <!-- Active arc (cooling indicator) -->
  <path d="M 332 412 A 220 220 0 0 1 692 412" fill="none" stroke="#0891b2" stroke-width="22" stroke-linecap="round"/>

  <!-- Inner dial face -->
  <circle cx="512" cy="512" r="240" fill="url(#dial)"/>

  <!-- Temperature readout -->
  <text x="512" y="540" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="220" font-weight="700" text-anchor="middle" fill="#f1f5f9">72°</text>

  <!-- Mode label -->
  <text x="512" y="650" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="56" font-weight="500" text-anchor="middle" fill="#94a3b8" letter-spacing="6">COOL</text>
</svg>
