manifestVersion: 1
id: ecobee-dashboard
category: utilities
name: Ecobee Dashboard
version: "0.2.0"
tagline: Live status, runtime history, and cost estimation for Ecobee SmartBuildings
description: >-
  An internal dashboard for managers of Ecobee SmartBuildings fleets.


  Features:

  - Live grid of every thermostat with current temperature, setpoints, mode,
    running equipment, and alert counts.

  - 5-minute polling historian that records runtime locally so you have
    your own time-series — Ecobee's SB API does not expose runtime history.

  - Daily fleet runtime chart with stacked heat / cool / fan hours, going
    back as far as you've collected data.

  - Period cards for Today / This week / This month / YTD with a
    year-over-year comparison once a full year of data is collected.

  - Estimated electricity cost per period based on a user-configurable
    $/kWh rate and per-component equipment wattages.

  - Animated weather widget pulled from the thermostats' own weather
    feed, with sunny / partly cloudy / rain / snow / thunder / fog states.

  - Animated equipment indicators (spinning fan blades, flickering flame,
    rotating snowflake, pulsing aux-heat bolt) on the per-thermostat table.

  - Dark mode with sun/moon toggle, respects system preference.

  - Configurable display timezone — server runs in UTC but the UI
    boundaries (today/week/etc) and rendered times can be in any IANA zone.

  - First-run setup page collects your SmartBuildings API credentials
    (obtain from Ecobee SB support — these are separate from your portal
    login). Stored locally in SQLite, never sent anywhere except api.sb.ecobee.com.

releaseNotes: >-
  v0.2.0 — first Umbrel release. Includes in-app setup flow so
  SmartBuildings API credentials can be configured without editing
  environment variables.

