version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: ecobee-dashboard_web_1
      APP_PORT: 3000

  web:
    image: ghcr.io/rvt-nick/ecobee-dashboard:0.2.0
    restart: on-failure
    stop_grace_period: 1m
    environment:
      PORT: 3000
    volumes:
      - ${APP_DATA_DIR}/data:/app/data
