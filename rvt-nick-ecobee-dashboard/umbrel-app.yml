manifestVersion: 1
id: rvt-nick-ecobee-dashboard
name: Ecobee Dashboard
tagline: Live status, runtime history, and cost estimation for Ecobee SmartBuildings
icon: https://raw.githubusercontent.com/rvt-nick/ecobee-umbrel-store/main/rvt-nick-ecobee-dashboard/icon.svg
category: Utilities
version: "0.2.0"
port: 3000
description: >-
  An internal dashboard for managers of Ecobee SmartBuildings fleets.


  Features:

  - Live grid of every thermostat with current temperature, setpoints, mode,
    running equipment, and alert counts.

  - 5-minute polling historian that records runtime locally so you have
    your own time-series — Ecobee's SB API does not expose runtime history.

  - Daily fleet runtime chart with stacked heat / cool / fan hours.

  - Period cards for Today / This week / This month / YTD with a
    year-over-year comparison once a full year of data is collected.

  - Estimated electricity cost per period based on a configurable
    $/kWh rate and per-component equipment wattages.

  - Animated weather widget pulled from the thermostats' own weather
    feed (sunny, partly cloudy, rain, snow, thunder, fog).

  - Animated equipment indicators on the per-thermostat table.

  - Dark mode with sun/moon toggle, respects system preference.

  - Configurable display timezone.

  - First-run setup collects your SmartBuildings API credentials
    (obtain from Ecobee SB support — different from your portal login).
    Stored locally in SQLite, never sent anywhere except api.sb.ecobee.com.

releaseNotes: >-
  v0.2.0 — first Umbrel release. Includes in-app setup flow so credentials
  can be configured without editing environment variables.

